<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- The classic mysterious, vague title -->
    <title>1</title>
</head>
<!-- The styling captures the authentic pitch-black background and monospace tech font -->
<body style="background-color: #000000; color: #b0b0b0; font-family: 'Courier New', Courier, monospace; text-align: center; padding: 40px 20px; margin: 0;">

    <!-- Title layout matching the old-school look -->
    <h1 style="color: #666666; font-size: 18px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px;">
    </h1>

    <!-- 🖼️ THE RIDDLE PICTURE PLACEHOLDER -->
    <!-- Swap "level1.jpg" with your own dark photo. 
         The CSS below forces a moody dark border and scales nicely. -->
    <div style="margin: 0 auto; max-width: 600px;">
        <img src="level1.jpg" alt="A dark doorway shrouded in shadows" 
             style="width: 100%; border: 1px solid #222222; box-shadow: 0 0 15px rgba(255,255,255,0.05); filter: contrast(120%) brightness(80%);">
    </div>

    <!-- Main riddle text -->
    <div style="margin-top: 30px; font-size: 14px; line-height: 1.6;">
        <p style="color: #ffffff; font-style: italic;">"The path begins where the light stops."</p>
        <p> </p>
    </div>

    <!-- Instructions for the URL mechanic -->
    <div style="margin-top: 60px; font-size: 11px; color: #444444; border-top: 1px dashed #222222; padding-top: 20px;">
        <p>Navigation: Do not look for buttons. Modify the browser address bar.</p>
        <p>Replace <span style="color: #666;">index.html</span> with your answer followed by <span style="color: #666;">.html</span></p>
    </div>
</body>
</html>
